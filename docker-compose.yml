version: "3.9"

services:
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7
    container_name: wazuh-manager
    ports:
      - "1514:1514/udp"
      - "1515:1515/tcp"
      - "55000:55000/tcp"
    networks:
      - soc-backend
    volumes:
      - wazuh-data:/var/ossec/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:55000"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      - WAZUH_PASSWORD=${WAZUH_PASSWORD}

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7
    container_name: wazuh-dashboard
    ports:
      - "443:5601"
    depends_on:
      - wazuh-manager
    networks:
      - soc-frontend
      - soc-backend

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./suricata/rules:/etc/suricata/rules

  grafana:
    image: grafana/grafana:10.2
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - soc-frontend
      - soc-backend
    volumes:
      - grafana-data:/var/lib/grafana

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    networks:
      - soc-backend
    volumes:
      - cassandra-data:/var/lib/cassandra

  thehive:
    image: strangebee/thehive:5
    container_name: thehive
    ports:
      - "9000:9000"
    depends_on:
      - cassandra
    networks:
      - soc-frontend
      - soc-backend
    volumes:
      - thehive-data:/opt/thehive/data

networks:
  soc-frontend:
  soc-backend:

volumes:
  wazuh-data:
  grafana-data:
  cassandra-data:
  thehive-data:
